<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Amazon Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cart.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo" style="text-decoration: none; display: flex; align-items: baseline; gap: 6px;">
        <div style="position: relative; display: inline-block;">
          <span style="font-size: 24px; font-weight: 800; color: #FFF; letter-spacing: -0.5px; line-height: 1;">amazon</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" width="56" height="16" style="position: absolute; bottom: -8px; left: 2px;">
            <path fill="#FF9900" d="M94.2,20.5c-8.5,6.1-20.7,8.8-32.6,8.8c-12.6,0-23.4-3.1-31.4-7.6c-1.1-0.6-0.9-1.9,0.5-1.4 c10.4,3.3,21.7,4.9,33.2,4.9c11.2,0,21.7-2,30.1-5.8C95.4,18.7,96.1,19.5,94.2,20.5z"/>
            <path fill="#FF9900" d="M94.9,14.7c-0.6-1-2-0.7-2.4,0.5c-0.9,2.4-2.8,7.3-9.6,9.3c0.5,0.4,3.3,2.4,3.8,2.8 c3.9,0.1,8.1-2.4,10.5-8.2C97.6,18.2,97.3,15.8,94.9,14.7z"/>
          </svg>
        </div>
        <span style="color: var(--orange-500, #FF9900); font-weight: 800; font-size: 18px; letter-spacing: -0.3px;">second life</span>
      </a>
      <nav class="header__nav" style="align-items: center;">
        <a href="/">Products</a>
        <a href="/orders.html">My Orders</a>
        <a href="/second-life.html">Second Life</a>
        <a href="/green-credits.html">💚 Credits</a>
        <a href="/cart.html" class="header__cart" id="nav-cart" style="display: flex; align-items: center; padding: 4px 10px; margin-left: 12px; color: #fff; text-decoration: none;">
          <div style="position: relative;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 26" width="38" height="26">
              <path fill="#FFF" d="M13 19c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm16 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm3.6-11.8c-.4-.3-.9-.5-1.4-.5H11.2L10.3 4c-.2-.6-.8-1-1.4-1H3C2.4 3 2 3.4 2 4s.4 1 1 1h4.8l3.6 9.6c.2.6.8 1 1.4 1h16.4c.6 0 1.2-.4 1.4-1l2.6-7c.2-.5.1-1.1-.2-1.4zm-4.4 7.3H13.6l-2-5.5h19.5l-2.1 5.5z"/>
            </svg>
            <span id="nav-cart-count" style="position: absolute; top: -3px; left: 14px; color: #f08804; font-weight: 700; font-size: 16px; width: 16px; text-align: center;">0</span>
          </div>
          <span style="font-weight: 700; font-size: 14px; margin-top: 10px; margin-left: 2px;">Cart</span>
        </a>
      </nav>
    </div>
  </header>

  <div class="cart-container">
    <div class="cart-main">
      <h1>Shopping Cart</h1>
      <div id="cart-items"></div>
      <div id="cart-total-bottom" class="cart-subtotal"></div>
    </div>
    
    <div class="cart-sidebar" id="cart-sidebar" style="display: none;">
      <h3 style="font-size: 18px; font-weight: 400; margin-bottom: 12px;" id="sidebar-subtotal">Subtotal (0 items): ₹0</h3>
      <button class="checkout-btn" onclick="location.href='/checkout.html'">Proceed to Checkout</button>
    </div>
  </div>

  <script src="js/cart.js"></script>
</body>
</html>
