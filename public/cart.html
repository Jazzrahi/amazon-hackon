<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Amazon Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-900: #0F1923;
      --navy-800: #1A2734;
      --navy-700: #232F3E;
      --orange-500: #FF9900;
      --white: #FFFFFF;
      --gray-100: #F5F5F5;
      --gray-200: #EAEDED;
      --gray-300: #D5D9D9;
      --gray-600: #565959;
      --gray-800: #0F1111;
      --red-price: #B12704;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-200);
      color: var(--gray-800);
    }

    /* ─── HEADER ─── */
    .header {
      background: linear-gradient(180deg, var(--navy-900) 0%, var(--navy-700) 100%);
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header__inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      height: 64px;
      gap: 32px;
    }

    .header__nav {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .header__nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .header__nav a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.08);
    }

    /* ─── CART LAYOUT ─── */
    .cart-container {
      max-width: 1280px;
      margin: 32px auto;
      display: flex;
      gap: 24px;
      padding: 0 32px;
      align-items: flex-start;
    }

    .cart-main {
      flex: 1;
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius-sm);
    }

    .cart-sidebar {
      width: 320px;
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius-sm);
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--gray-300);
      padding-bottom: 12px;
    }

    .cart-item {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--gray-200);
    }

    .cart-item__image {
      width: 180px;
      height: 180px;
      object-fit: contain;
      background: #f8f8f8;
      border-radius: 8px;
    }

    .cart-item__details {
      flex: 1;
    }

    .cart-item__name {
      font-size: 18px;
      font-weight: 500;
      color: #007185;
      margin-bottom: 8px;
    }

    .cart-item__price {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cart-item__stock {
      color: #007600;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .cart-item__remove {
      color: #007185;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding-left: 8px;
      border-left: 1px solid #ddd;
      margin-left: 8px;
    }

    .cart-item__remove:hover {
      text-decoration: underline;
    }

    .cart-subtotal {
      font-size: 18px;
      text-align: right;
      padding-top: 16px;
    }

    .checkout-btn {
      width: 100%;
      background: #FFD814;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 2px 5px rgba(213,217,217,0.5);
    }

    .checkout-btn:hover {
      background: #F7CA00;
    }

    .empty-cart {
      text-align: center;
      padding: 48px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo" style="text-decoration: none; display: flex; align-items: baseline; gap: 6px;">
        <div style="position: relative; display: inline-block;">
          <span style="font-size: 24px; font-weight: 800; color: #FFF; letter-spacing: -0.5px; line-height: 1;">amazon</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" width="56" height="16" style="position: absolute; bottom: -8px; left: 2px;">
            <path fill="#FF9900" d="M94.2,20.5c-8.5,6.1-20.7,8.8-32.6,8.8c-12.6,0-23.4-3.1-31.4-7.6c-1.1-0.6-0.9-1.9,0.5-1.4 c10.4,3.3,21.7,4.9,33.2,4.9c11.2,0,21.7-2,30.1-5.8C95.4,18.7,96.1,19.5,94.2,20.5z"/>
            <path fill="#FF9900" d="M94.9,14.7c-0.6-1-2-0.7-2.4,0.5c-0.9,2.4-2.8,7.3-9.6,9.3c0.5,0.4,3.3,2.4,3.8,2.8 c3.9,0.1,8.1-2.4,10.5-8.2C97.6,18.2,97.3,15.8,94.9,14.7z"/>
          </svg>
        </div>
        <span style="color: var(--orange-500, #FF9900); font-weight: 800; font-size: 18px; letter-spacing: -0.3px;">second life</span>
      </a>
      <nav class="header__nav" style="align-items: center;">
        <a href="/product.html">Products</a>
        <a href="/orders.html">My Orders</a>
        <a href="/second-life.html">Second Life</a>
        <a href="/green-credits.html">💚 Credits</a>
        <a href="/cart.html" class="header__cart" id="nav-cart" style="display: flex; align-items: center; padding: 4px 10px; margin-left: 12px; color: #fff; text-decoration: none;">
          <div style="position: relative;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 26" width="38" height="26">
              <path fill="#FFF" d="M13 19c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm16 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm3.6-11.8c-.4-.3-.9-.5-1.4-.5H11.2L10.3 4c-.2-.6-.8-1-1.4-1H3C2.4 3 2 3.4 2 4s.4 1 1 1h4.8l3.6 9.6c.2.6.8 1 1.4 1h16.4c.6 0 1.2-.4 1.4-1l2.6-7c.2-.5.1-1.1-.2-1.4zm-4.4 7.3H13.6l-2-5.5h19.5l-2.1 5.5z"/>
            </svg>
            <span id="nav-cart-count" style="position: absolute; top: -3px; left: 14px; color: #f08804; font-weight: 700; font-size: 16px; width: 16px; text-align: center;">0</span>
          </div>
          <span style="font-weight: 700; font-size: 14px; margin-top: 10px; margin-left: 2px;">Cart</span>
        </a>
      </nav>
    </div>
  </header>

  <div class="cart-container">
    <div class="cart-main">
      <h1>Shopping Cart</h1>
      <div id="cart-items"></div>
      <div id="cart-total-bottom" class="cart-subtotal"></div>
    </div>
    
    <div class="cart-sidebar" id="cart-sidebar" style="display: none;">
      <h3 style="font-size: 18px; font-weight: 400; margin-bottom: 12px;" id="sidebar-subtotal">Subtotal (0 items): ₹0</h3>
      <button class="checkout-btn" onclick="location.href='/checkout.html'">Proceed to Checkout</button>
    </div>
  </div>

  <script>
    function updateGlobalCartCount() {
      const cc = document.getElementById('nav-cart-count');
      if (cc) {
        const cart = JSON.parse(localStorage.getItem('cart_' + (localStorage.getItem('active_user') || 'user_001'))) || [];
        cc.textContent = cart.length;
      }
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart_' + (localStorage.getItem('active_user') || 'user_001'))) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart_' + (localStorage.getItem('active_user') || 'user_001'), JSON.stringify(cart));
      renderCart();
    }

    function renderCart() {
      updateGlobalCartCount();
      const cart = JSON.parse(localStorage.getItem('cart_' + (localStorage.getItem('active_user') || 'user_001'))) || [];
      const container = document.getElementById('cart-items');
      const bottomTotal = document.getElementById('cart-total-bottom');
      const sidebar = document.getElementById('cart-sidebar');
      const sidebarSubtotal = document.getElementById('sidebar-subtotal');

      if (cart.length === 0) {
        container.innerHTML = '<div class="empty-cart"><h2>Your Amazon Cart is empty.</h2><a href="/second-life.html" style="color: #007185; text-decoration: none;">Shop today\'s deals</a></div>';
        bottomTotal.innerHTML = '';
        sidebar.style.display = 'none';
        return;
      }

      sidebar.style.display = 'block';
      let html = '';
      let total = 0;

      cart.forEach((item, index) => {
        total += item.resale_price || item.price || 0;
        const img = item.image_url ? item.image_url : '';
        const priceStr = (item.resale_price || item.price || 0).toLocaleString('en-IN');
        
        html += `
          <div class="cart-item">
            ${img ? `<img src="${img}" class="cart-item__image">` : `<div class="cart-item__image" style="display:flex; align-items:center; justify-content:center; font-size:48px;">📦</div>`}
            <div class="cart-item__details">
              <h3 class="cart-item__name">${item.name}</h3>
              <div class="cart-item__price">₹${priceStr}</div>
              <div class="cart-item__stock">In stock</div>
              <div>
                <span style="font-size: 14px;">Qty: 1</span>
                <button class="cart-item__remove" onclick="removeItem(${index})">Delete</button>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      const totalStr = `Subtotal (${cart.length} item${cart.length !== 1 ? 's' : ''}): <strong>₹${total.toLocaleString('en-IN')}</strong>`;
      bottomTotal.innerHTML = totalStr;
      sidebarSubtotal.innerHTML = totalStr;
    }

    document.addEventListener('DOMContentLoaded', renderCart);
    window.addEventListener('storage', renderCart);
  </script>
</body>
</html>
